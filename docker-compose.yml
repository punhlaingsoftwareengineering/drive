services:
  app:
    build: .
    ports:
      - '1025:1025'
    environment:
      ORIGIN: ${ORIGIN:-http://localhost:1025}
      PUBLIC_APP_NAME: ${PUBLIC_APP_NAME:-ZNL-DRIVE}
      PORT: '1025'
      BODY_SIZE_LIMIT: 8M
      MAX_UPLOAD_BYTES: '0'
      LOCAL_DRIVE_DATA_DIR: /data/znl-drive
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env
    volumes:
      # Bind-mount host disk (not a Docker-managed named volume). Set LOCAL_DRIVE_HOST_PATH in .env.
      - ${LOCAL_DRIVE_HOST_PATH:-./data/drive}:/data/znl-drive

# For HTTPS on a LAN or cloud VM, put a reverse proxy in front and forward headers.
# Example nginx location block (uncomment and add an nginx service if needed):
#
#   proxy_set_header Host $host;
#   proxy_set_header X-Forwarded-Proto $scheme;
#   proxy_set_header X-Forwarded-Host $host;
#
# Then set on the app:
#   ORIGIN=https://drive.example.com
#   PROTOCOL_HEADER=x-forwarded-proto
#   HOST_HEADER=x-forwarded-host
